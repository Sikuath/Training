<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Chiffres significatifs</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="significatifs.css">

  <script>
    sessionStorage.setItem("lastExercise", window.location.href);
  </script>
</head>

<body class="page significatifs-page">

  <nav class="topbar">
    <a class="home" href="index.html">🏠 Accueil</a>
    <a class="rappel" href="rappels.html">📘 Rappels</a>
  </nav>

  <!-- HUD -->
  <div class="hud">
    <div>⏱ Temps : <span id="timer">180s</span></div>
    <div>⭐ Score : <span id="score">0</span></div>
    <div>🏆 Niveau : <span id="level">1</span></div>
    <div>🥇 Best : <span id="best">0</span></div>
  </div>

  <div class="progress-bar">
    <div id="progress"></div>
  </div>

  <div class="quiz-card" id="card">

    <h2>Chiffres significatifs</h2>

    <p id="question">Clique sur Démarrer</p>

    <input type="number" id="answer" placeholder="Réponse">

    <p id="feedback"></p>

    <div class="buttons">

      <!-- 🔥 FIX IMPORTANT : onclick direct -->
      <button id="startBtn" onclick="startGame()">Démarrer</button>

      <button id="validateBtn" onclick="submit()" style="display:none;">
        Valider
      </button>

      <button id="stopBtn" onclick="endGame(true)" style="display:none;">
        Fin
      </button>

    </div>

  </div>

  <audio id="goodSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
  <audio id="badLight" src="https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg"></audio>
  <audio id="badHeavy" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

  <script src="scoreService.js"></script>
  <script src="significatifs.js"></script>

</body>
</html>
