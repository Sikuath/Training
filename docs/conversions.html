<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Conversions</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="conversions.css">

  <script>
    sessionStorage.setItem("lastExercise", window.location.href);
  </script>
</head>

<body class="page conversions-page">

  <nav class="topbar">
    <a class="home" href="index.html">🏠 Accueil</a>
    <a class="rappel" href="rappels.html">📘 Rappels</a>
  </nav>

  <h2>Conversions</h2>

  <div class="game-card">

    <div class="hud">
      <div>⏱ Temps : <span id="timer">180s</span></div>
      <div>⭐ Score : <span id="score">0</span></div>
      <div>🎯 Mode : <span id="mode">easy</span></div>
    </div>

    <p id="question">Clique sur Démarrer</p>

    <input type="text" id="answer" placeholder="Réponse">
    <p id="feedback"></p>

    <div class="buttons">
      <button id="startBtn" onclick="startGame()">Démarrer</button>
      <button id="validateBtn" onclick="submitAnswer()" style="display:none;">Valider</button>
      <button id="stopBtn" onclick="endGame()" style="display:none;">Fin</button>
    </div>

  </div>

  <audio id="goodSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg" preload="auto"></audio>
  <audio id="badLight" src="https://actions.google.com/sounds/v1/cartoon/boing.ogg" preload="auto"></audio>
  
<script src="conversions.js"></script>
</body>
</html>
