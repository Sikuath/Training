<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Expressions littérales</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="expressions.css">

  <script>
    sessionStorage.setItem("lastExercise", window.location.href);
  </script>

  <!-- MATHJAX -->
  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(', '\\)'], ['$', '$']] }
    };
  </script>

  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

</head>

<body class="page expressions-page">

  <!-- NAV -->
  <nav class="topbar">
    <a class="home" href="index.html">🏠 Accueil</a>
    <a class="rappel" href="rappels.html">📘 Rappels</a>
  </nav>

  <!-- ===================== 3 COLONNES ===================== -->
  <div class="game-container">

    <!-- 🟦 GAUCHE : CONTEXTE -->
    <div class="panel left">

      <div id="imageDomain"></div>

      <img id="illustration">

      <div id="imageTitle"></div>

    </div>

    <!-- 🟨 CENTRE : JEU -->
    <div class="panel center">

      <div class="hud">
        <div>⏱ <span id="timer">180s</span></div>
        <div>⭐ <span id="score">0</span></div>
        <div>🎯 <span id="mode">easy</span></div>
      </div>

      <div id="question">Clique sur Démarrer</div>

      <div id="choices" class="choices"></div>

      <div class="buttons">
        <button id="startBtn" onclick="startGame()">Démarrer</button>
        <button id="stopBtn" onclick="quitGame()">Fin</button>
      </div>

    </div>

    <!-- 🟥 DROITE : FEEDBACK -->
    <div class="panel right">

      <div id="feedback"></div>

    </div>

  </div>

  <!-- SONS -->
  <audio id="goodSound"
    src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"
    preload="auto"></audio>

  <audio id="badLight"
    src="https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg"
    preload="auto"></audio>

  <script src="expressions.js"></script>

</body>
</html>
