<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Expressions littérales</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="expressions.css">

  <script>
    sessionStorage.setItem("lastExercise", window.location.href);
  </script>

<!-- MATHJAX -->
<script>
window.MathJax = {
  tex: { inlineMath: [['\\(', '\\)'], ['$', '$']] }
};
</script>
<script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

</head>

<body class="page expressions-page">

  <!-- NAV -->
  <nav class="topbar">
    <a class="home" href="index.html">🏠 Accueil</a>
    <a class="rappel" href="rappels.html">📘 Rappels</a>
  </nav>

  <!-- ✅ LAYOUT GLOBAL -->
  <div class="game-wrapper">

    <div class="game-card">

      <h2>Expressions littérales</h2>

      <div class="hud">
        <div>⏱ Temps : <span id="timer">180s</span></div>
        <div>⭐ Score : <span id="score">0</span></div>
        <div>🎯 Mode : <span id="mode">easy</span></div>
      </div>

      <p id="question">Clique sur Démarrer</p>

      <div id="choices" class="choices"></div>

      <div id="feedback-wrapper">
        <p id="feedback"></p>
      </div>

      <div class="buttons">
        <button id="startBtn" onclick="startGame()">Démarrer</button>
        <button id="validateBtn" style="display:none;">Valider</button>
        <button id="stopBtn" onclick="quitGame()" style="display:none;">Fin</button>
      </div>

    </div>

    <!-- ✅ IMAGE HORS CADRE -->
    <div class="image-zone">
      <img id="illustration">
    </div>

  </div>

  <!-- SONS -->
  <audio id="goodSound"
    src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"
    preload="auto"></audio>

  <audio id="badLight"
    src="https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg"
    preload="auto"></audio>

  <script src="expressions.js"></script>

</body>
</html>
