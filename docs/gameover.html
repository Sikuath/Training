<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>GAME OVER</title>
<link rel="stylesheet" href="retro.css">

<style>

/* =========================
   RETRO GAME OVER EFFECT
========================= */

body {
  margin: 0;
  background: black;
  color: #00ffcc;
  font-family: "Courier New", monospace;
  overflow: hidden;
}

/* scanlines */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.03),
    rgba(255,255,255,0.03) 2px,
    transparent 2px,
    transparent 4px
  );
  pointer-events: none;
}

/* glitch title */
.glitch {
  font-size: 60px;
  text-align: center;
  margin-top: 120px;
  position: relative;
  animation: flicker 1.5s infinite;
}

.glitch::before,
.glitch::after {
  content: "GAME OVER";
  position: absolute;
  left: 0;
  width: 100%;
}

.glitch::before {
  animation: glitchTop 0.8s infinite;
  color: red;
}

.glitch::after {
  animation: glitchBottom 0.8s infinite;
  color: blue;
}

@keyframes glitchTop {
  0% { transform: translate(2px, -2px); }
  50% { transform: translate(-2px, 2px); }
  100% { transform: translate(2px, -2px); }
}

@keyframes glitchBottom {
  0% { transform: translate(-2px, 2px); }
  50% { transform: translate(2px, -2px); }
  100% { transform: translate(-2px, 2px); }
}

@keyframes flicker {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

.container {
  text-align: center;
  margin-top: 40px;
}

input {
  font-size: 20px;
  text-transform: uppercase;
  width: 80px;
  text-align: center;
}

button {
  margin-top: 10px;
  font-size: 18px;
  cursor: pointer;
}

</style>

</head>

<body>

<h1 class="glitch">GAME OVER</h1>

<div class="container">

  <p>SCORE : <span id="score">0</span></p>

  <input id="pseudo" maxlength="3" placeholder="AAA" autofocus />

  <br>

  <button id="okBtn">SAVE</button>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const score = Number(params.get("score") || 0);

document.getElementById("score").textContent = score;

/* =========================
   SAVE SCORE (TOP 10 ONLY)
========================= */

document.getElementById("okBtn").addEventListener("click", () => {

  const name = document.getElementById("pseudo").value
    .toUpperCase()
    .trim()
    .slice(0, 3);

  if (!name) return;

  let ranking = JSON.parse(localStorage.getItem("ranking") || "[]");

  ranking.push({ name, score });

  ranking.sort((a, b) => b.score - a.score);

  ranking = ranking.slice(0, 10); // 🔥 TOP 10

  localStorage.setItem("ranking", JSON.stringify(ranking));

  window.location.href = "score.html";
});

</script>

</body>
</html>
