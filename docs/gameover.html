<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>GAME OVER</title>
<link rel="stylesheet" href="retro.css">
</head>

<body class="game-page">

<h1 class="glitch" id="title">GAME OVER</h1>

<div class="container">
  <p>SCORE : <span id="score">0</span></p>

  <input id="pseudo" maxlength="3" placeholder="AAA" autofocus />
  <br>

  <button id="okBtn">SAVE</button>
</div>

<script>

const params = new URLSearchParams(window.location.search);

const game = params.get("game") || "unknown";
const score = Number(params.get("score") || 0);

document.getElementById("score").textContent = score;

/* =========================
   TITRE DYNAMIQUE 4 JEUX
========================= */

document.getElementById("title").textContent =
  game === "conversions"
    ? "CONVERSIONS - GAME OVER"
    : game === "significatifs"
      ? "SIGNIFICATIFS - GAME OVER"
      : game === "expressions"
        ? "EXPRESSIONS - GAME OVER"
        : game === "incertitudes"
          ? "INCERTITUDES - GAME OVER"
          : "GAME OVER";

/* =========================
   SAVE SCORE UNIFIÉ
========================= */

document.getElementById("okBtn").addEventListener("click", () => {

  const name = document.getElementById("pseudo").value
    .toUpperCase()
    .trim()
    .slice(0, 3);

  if (!name) return;

  const key = "ranking_" + game;

  let ranking = JSON.parse(localStorage.getItem(key) || "[]");

  ranking.push({ name, score });

  ranking.sort((a, b) => b.score - a.score);

  ranking = ranking.slice(0, 10);

  localStorage.setItem(key, JSON.stringify(ranking));

  window.location.href = "score.html";
});

</script>

</body>
</html>
