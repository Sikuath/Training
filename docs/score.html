<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>HIGH SCORES</title>
<link rel="stylesheet" href="retro.css">
</head>

<body>

<h1>HIGH SCORES</h1>

<table>
  <thead>
    <tr>
      <th>#</th>
      <th>NAME</th>
      <th>SCORE</th>
    </tr>
  </thead>

  <tbody id="scores"></tbody>
</table>

<script>

const data = JSON.parse(localStorage.getItem("ranking") || "[]");

const tbody = document.getElementById("scores");

data.forEach((e, i) => {

  const row = document.createElement("tr");

  row.innerHTML = `
    <td>${i + 1}</td>
    <td>${e.name}</td>
    <td>${e.score}</td>
  `;

  tbody.appendChild(row);
});

</script>

</body>
</html>
