<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>HIGH SCORES</title>
<link rel="stylesheet" href="retro.css">
</head>

<body class="score-page">

<!-- RETOUR -->
<button class="back-btn" onclick="window.location.href='index.html'">
⬅ RETOUR
</button>

<h1 class="arcade-title">🏆 HIGH SCORES</h1>

<!-- EXPLICATION -->
<div class="legend">
  <span>📊 # Classement</span>
  <span>👤 Nom</span>
  <span>⭐ Score</span>
</div>

<!-- CONTENEUR 2 COLONNES -->
<div class="scores-container">

  <!-- SIGNIFICATIFS -->
  <div class="score-block">
    <h2>📐 Significatifs</h2>

    <div class="scoreboard-header">
      <span>#</span>
      <span>Nom</span>
      <span>Score</span>
    </div>

    <div class="scoreboard" id="sig"></div>
  </div>

  <!-- CONVERSIONS -->
  <div class="score-block">
    <h2>🔢 Conversions</h2>

    <div class="scoreboard-header">
      <span>#</span>
      <span>Nom</span>
      <span>Score</span>
    </div>

    <div class="scoreboard" id="conv"></div>
  </div>

</div>

<script>

function display(key, id) {

  let data = JSON.parse(localStorage.getItem(key) || "[]");

  const container = document.getElementById(id);
  container.innerHTML = "";

  if (!data.length) {
    container.innerHTML = "<div class='row empty'>Aucun score</div>";
    return;
  }

  data.forEach((e, i) => {

    const row = document.createElement("div");
    row.className = "row";

    row.innerHTML = `
      <span>${i + 1}</span>
      <span>${e.name}</span>
      <span>${e.score}</span>
    `;

    container.appendChild(row);
  });
}

display("ranking_significatifs", "sig");
display("ranking_conversions", "conv");

</script>

</body>
</html>
