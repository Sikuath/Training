<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>HIGH SCORES</title>

<link rel="stylesheet" href="retro.css">

<style>

/* bouton retour */
.back-btn {
  position: fixed;
  top: 10px;
  left: 10px;
  padding: 8px 12px;
  background: #111;
  border: 1px solid lime;
  color: lime;
  cursor: pointer;
}

/* table */
table {
  margin: 80px auto;
  border-collapse: collapse;
}

td, th {
  border: 1px solid lime;
  padding: 10px;
}

/* optionnel overlay lisibilité */
.score-page::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  pointer-events: none;
}

</style>

</head>

<!-- ✅ ICI le body correct -->
<body class="score-page">

<button class="back-btn" onclick="window.location.href='index.html'">
  ⬅ RETOUR
</button>

<h1 style="text-align:center;">HIGH SCORES</h1>

<table>
  <thead>
    <tr>
      <th>#</th>
      <th>NAME</th>
      <th>SCORE</th>
    </tr>
  </thead>

  <tbody id="scores"></tbody>
</table>

<script>

let ranking = JSON.parse(localStorage.getItem("ranking") || "[]");

/* TOP 10 */
ranking = ranking
  .sort((a,b) => b.score - a.score)
  .slice(0,10);

const tbody = document.getElementById("scores");

ranking.forEach((e, i) => {

  const row = document.createElement("tr");

  row.innerHTML = `
    <td>${i + 1}</td>
    <td>${e.name}</td>
    <td>${e.score}</td>
  `;

  tbody.appendChild(row);
});

</script>

</body>
</html>
