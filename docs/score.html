<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>SCORES</title>
<link rel="stylesheet" href="retro.css">

<script src="scoreService.js"></script>
</head>

<body>

<div class="score-screen">

  <h1>HIGH SCORES</h1>

  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>NAME</th>
        <th>SCORE</th>
      </tr>
    </thead>

    <tbody id="scores"></tbody>
  </table>

  <button onclick="restart()">RESTART</button>

</div>

<script>

document.addEventListener("DOMContentLoaded", () => {

  const data = getRanking();

  const tbody = document.getElementById("scores");

  tbody.innerHTML = "";

  data.forEach((e, i) => {

    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${i + 1}</td>
      <td>${e.name}</td>
      <td>${e.score}</td>
    `;

    tbody.appendChild(row);
  });

});

function restart() {
  window.location.href = "index.html";
}

</script>

</body>
</html>
