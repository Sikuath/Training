  <h2>Expressions littérales</h2>

  <div class="content">
    <p>Simplifier : 2x + 3x = ?</p>

    <input type="text" id="rep3">
    <button onclick="verif3()">Vérifier</button>

    <p id="res3"></p>
  </div>

  <script>
    function verif3() {
      let r = document.getElementById('rep3').value.trim();

      document.getElementById('res3').textContent =
        (r === "5x") ? "✔ Correct !" : "✘ Incorrect";
    }
  </script>
